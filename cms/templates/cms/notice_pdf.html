<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ notice.title_en }}</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #190933;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .school-name {
            font-size: 28px;
            font-weight: bold;
            color: #190933;
        }
        .notice-title {
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0 20px;
            color: #5DD9C1;
        }
        .meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .content {
            margin: 30px 0;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="school-name">Dhaka Ideal Academy</div>
        <div>Committed to Excellence in Education</div>
    </div>
    <div class="notice-title">{{ notice.title_en }}</div>
    <div class="meta">
        <strong>Category:</strong> {{ notice.category }} &nbsp;|&nbsp;
        <strong>Date:</strong> {{ notice.created_at|date:"d M Y" }}
    </div>
    <div class="content">
        {{ notice.description_en|linebreaks }}
    </div>
    <div class="footer">
        Dhaka Ideal Academy – Official Notice<br>
        Generated on {% now "d M Y, h:i A" %}
    </div>
</body>
</html>
