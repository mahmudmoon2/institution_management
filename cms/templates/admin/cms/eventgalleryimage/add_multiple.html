{% extends "admin/base_site.html" %}
{% load i18n admin_urls static admin_modify %}

{% block content %}
<div id="content-main">
  <h1>Add Multiple Gallery Images</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div>
      <label for="event">Event:</label>
      <select name="event" id="event" required>
        <option value="">---------</option>
        {% for event in events %}
        <option value="{{ event.id }}">{{ event.title_en }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="images">Select Images (multiple):</label>
      <input type="file" name="images" id="images" multiple required accept="image/*">
      <div class="help">You can select multiple images by holding Ctrl (Windows) or Cmd (Mac).</div>
    </div>
    <div>
      <label for="caption_en">Caption (English):</label>
      <input type="text" name="caption_en" id="caption_en">
    </div>
    <div>
      <label for="caption_bn">Caption (Bengali):</label>
      <input type="text" name="caption_bn" id="caption_bn">
    </div>
    <div>
      <label for="order">Order:</label>
      <input type="number" name="order" id="order" value="0">
    </div>
    <div class="submit-row">
      <input type="submit" value="Upload Images" class="default">
    </div>
  </form>
</div>
{% endblock %}
